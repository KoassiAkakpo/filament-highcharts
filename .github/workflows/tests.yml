name: Tests

on:
  push:
    paths:
      - '**.php'
      - '**.blade.php'
      - 'composer.json'
      - 'phpunit.xml.dist'
      - 'phpstan.neon.dist'
      - 'testbench.yaml'
      - 'config/**'
      - 'stubs/**'
      - '.github/workflows/tests.yml'
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']
    name: PHP ${{ matrix.php }}
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - run: composer update --prefer-stable --no-interaction --no-progress

      - run: vendor/bin/pest --ci

  tests-lowest-filament:
    runs-on: ubuntu-latest
    # Lowest Filament version installable under Composer's security-advisory
    # policy (5.0.0 was validated manually; advisories currently floor at 5.6.5).
    name: PHP 8.3 — lowest Filament
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - run: composer update --prefer-stable --no-interaction --no-progress

      - run: composer update "filament/*" --prefer-lowest --prefer-stable --with-all-dependencies --no-interaction --no-progress

      - run: vendor/bin/pest --ci

  static-analysis:
    runs-on: ubuntu-latest
    name: PHPStan
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - run: composer update --prefer-stable --no-interaction --no-progress

      - run: vendor/bin/phpstan analyse --no-progress --memory-limit=1G
